name: Sync base/dev to Clients

on:
  push:
    branches:
      - base/dev

permissions:
  contents: read

concurrency:
  group: sync-platform-to-clients-base-dev
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # continue other clients if one fails
      matrix:
        client:
          - repo: saikiran-vaddi-dg/Client-1
            remote: Client-1
            branch: client1/dev
          - repo: saikiran-vaddi-dg/Client-2
            remote: Client-2
            branch: client2/dev

    steps:
      - name: Checkout Platform (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync base/dev to ${{ matrix.client.remote }} base/dev
        env:
          TARGET_REPO: ${{ matrix.client.repo }}
          TARGET_REMOTE: ${{ matrix.client.remote }}
          TARGET_BRANCH: base/dev
          TOKEN: ${{ secrets.CLIENT_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${TOKEN}" ]; then
            echo "Missing secrets.CLIENT_DISPATCH_PAT"
            exit 1
          fi

          # Validate token works (does not print token)
          curl -fsSL -H "Authorization: token ${TOKEN}" https://api.github.com/user > /dev/null

          git config user.name  "saikiran-vaddi-dg"
          git config user.email "saikiran-vaddi-dg@users.noreply.github.com"

          # Add target remote using PAT
          git remote remove "${TARGET_REMOTE}" 2>/dev/null || true
          git remote add "${TARGET_REMOTE}" "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          # Ensure we're on the source branch
          git checkout base/dev

          # Fetch latest remote state so --force-with-lease doesn't fail with "stale info"
          git fetch --prune "${TARGET_REMOTE}" "${TARGET_BRANCH}:${TARGET_BRANCH}" || true

          # Push source to target
          git push --force "${TARGET_REMOTE}" "HEAD:${TARGET_BRANCH}"

      - name: Merge base/dev into ${{ matrix.client.remote }} ${{ matrix.client.branch }}
        env:
          TARGET_REPO: ${{ matrix.client.repo }}
          TARGET_REMOTE: ${{ matrix.client.remote }}
          CLIENT_BRANCH: ${{ matrix.client.branch }}
          TOKEN: ${{ secrets.CLIENT_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          git config user.name  "saikiran-vaddi-dg"
          git config user.email "saikiran-vaddi-dg@users.noreply.github.com"

          git remote remove "${TARGET_REMOTE}" 2>/dev/null || true
          git remote add "${TARGET_REMOTE}" "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          # Fetch both branches
          git fetch "${TARGET_REMOTE}" "base/dev" "${CLIENT_BRANCH}" || {
            echo "Failed to fetch branches from ${TARGET_REMOTE} — skipping merge"
            exit 0
          }

          # Switch to client branch and merge base/dev into it
          git checkout -B "${CLIENT_BRANCH}" "${TARGET_REMOTE}/${CLIENT_BRANCH}"
          git merge "${TARGET_REMOTE}/base/dev" --no-edit --allow-unrelated-histories \
            -m "chore: merge base/dev into ${CLIENT_BRANCH} [auto-sync]"

          # Push merged branch back
          git push "${TARGET_REMOTE}" "HEAD:${CLIENT_BRANCH}"
