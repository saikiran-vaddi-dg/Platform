# FILE LOCATION: PLATFORM repo → .github/workflows/notify-clients.yml
# Commit this to the MAIN branch of your PLATFORM repo

name: Notify CLIENT-1 on base/* push

on:
  push:
    branches:
      - base/dev
      - base/staging
      - base/qa

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Extract pushed branch
        id: branch
        run: |
          # e.g. refs/heads/base/dev → base/dev
          echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Dispatch event to CLIENT-1 repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.CLIENT_DISPATCH_PAT }}" \
            https://api.github.com/repos/${{ vars.CLIENT1_ORG }}/${{ vars.CLIENT1_REPO }}/dispatches \
            -d "{
              \"event_type\": \"platform-base-updated\",
              \"client_payload\": {
                \"branch\": \"${{ steps.branch.outputs.name }}\",
                \"sha\": \"${{ github.sha }}\"
              }
            }"
          echo "✅ Dispatched to ${{ vars.CLIENT1_ORG }}/${{ vars.CLIENT1_REPO }}"
          echo "   Branch: ${{ steps.branch.outputs.name }}"
