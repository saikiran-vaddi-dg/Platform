name: Sync base branches to Clients

on:
  push:
    branches:
      - base/dev
      - base/integration

permissions:
  contents: read

concurrency:
  group: sync-platform-${{ github.ref_name }}-to-clients
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # continue other clients if one fails
      matrix:
        client:
          - repo: saikiran-vaddi-dg/Client-1
            remote: Client-1
            prefix: client1
          - repo: saikiran-vaddi-dg/Client-2
            remote: Client-2
            prefix: client2

    steps:
      - name: Checkout Platform (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync ${{ github.ref_name }} to ${{ matrix.client.remote }}
        env:
          TARGET_REPO: ${{ matrix.client.repo }}
          TARGET_REMOTE: ${{ matrix.client.remote }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.CLIENT_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${TOKEN}" ]; then
            echo "Missing secrets.CLIENT_DISPATCH_PAT"
            exit 1
          fi

          # Validate token works (does not print token)
          curl -fsSL -H "Authorization: token ${TOKEN}" https://api.github.com/user > /dev/null

          git config user.name  "saikiran-vaddi-dg"
          git config user.email "saikiran-vaddi-dg@users.noreply.github.com"

          # Add target remote using PAT
          git remote remove "${TARGET_REMOTE}" 2>/dev/null || true
          git remote add "${TARGET_REMOTE}" "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          # Ensure we're on the source branch
          git checkout "${SOURCE_BRANCH}"

          # Fetch latest remote state
          git fetch --prune "${TARGET_REMOTE}" "${SOURCE_BRANCH}:${SOURCE_BRANCH}" || true

          # Push source to target (e.g. base/dev → Client-1/base/dev)
          git push --force "${TARGET_REMOTE}" "HEAD:${SOURCE_BRANCH}"

      - name: Merge ${{ github.ref_name }} into ${{ matrix.client.remote }} ${{ matrix.client.prefix }} branch
        env:
          TARGET_REPO: ${{ matrix.client.repo }}
          TARGET_REMOTE: ${{ matrix.client.remote }}
          CLIENT_PREFIX: ${{ matrix.client.prefix }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.CLIENT_DISPATCH_PAT }}
        run: |
          set -euo pipefail

          git config user.name  "saikiran-vaddi-dg"
          git config user.email "saikiran-vaddi-dg@users.noreply.github.com"

          # Derive client branch: base/dev → client1/dev, base/int → client1/int
          SUFFIX="${SOURCE_BRANCH#base/}"
          CLIENT_BRANCH="${CLIENT_PREFIX}/${SUFFIX}"

          git remote remove "${TARGET_REMOTE}" 2>/dev/null || true
          git remote add "${TARGET_REMOTE}" "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          # Fetch both branches
          git fetch "${TARGET_REMOTE}" "${SOURCE_BRANCH}" "${CLIENT_BRANCH}" || {
            echo "Failed to fetch branches from ${TARGET_REMOTE} — skipping merge"
            exit 0
          }

          # Switch to client branch and merge source into it
          git checkout -B "${CLIENT_BRANCH}" "${TARGET_REMOTE}/${CLIENT_BRANCH}"
          git merge "${TARGET_REMOTE}/${SOURCE_BRANCH}" --no-edit --allow-unrelated-histories \
            -m "chore: merge ${SOURCE_BRANCH} into ${CLIENT_BRANCH} [auto-sync]"

          # Push merged branch back
          git push "${TARGET_REMOTE}" "HEAD:${CLIENT_BRANCH}"
