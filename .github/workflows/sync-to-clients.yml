# Place this in: platform/.github/workflows/sync-to-clients.yml
#
# Triggers whenever you push to base/dev, base/stag, or base/qa
# Pushes the same branch into CLIENT-1 repo (mirror)

name: Sync base branches to clients

on:
  push:
    branches:
      - base/dev
      - base/stag
      - base/qa

jobs:
  sync-to-client1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Push mirror to CLIENT-1
        env:
          CLIENT1_TOKEN: ${{ secrets.CLIENT1_REPO_TOKEN }}
          BRANCH: ${{ github.ref_name }}   # e.g. base/dev
        run: |
          git remote add client1 https://x-access-token:${CLIENT1_TOKEN}@github.com/your-org/CLIENT-1.git
          git push client1 HEAD:refs/heads/${BRANCH} --force
          echo "✅ Synced ${BRANCH} → CLIENT-1/${BRANCH}"
